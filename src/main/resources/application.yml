server:
  port: 8300
  servlet:
    context-path: /api  # 建议加上统一的 API 前缀，方便后期配置 Nginx 路由和拦截器

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 请根据实际情况修改 localhost:3306 以及账号密码
#    url: jdbc:mysql://127.0.0.1:3306/wardrobe?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

    url: jdbc:mysql://127.0.0.1:3306/wardrobe?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123456

  # JSON 序列化配置 (微信小程序联调核心配置)
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    # 核心避坑：将所有的 Long / BigInt 类型全局转为 String 返回给前端，防止 JS 精度丢失
    generator:
      write_numbers_as_strings: true

  servlet:
    multipart:
      max-file-size: 10MB       # 单个文件最大限制
      max-request-size: 50MB    # 单次请求最大总大小

# MyBatis-Plus 配置
mybatis-plus:
  # mapper 对应的 XML 文件所在的路径 (如果写纯注解可以不配，但建议留着备用)
  mapper-locations: classpath*:/mapper/**/*.xml
  # 你的实体类所在的包名，配置后在 XML 里写返回类型就不用写全限定类名了
  type-aliases-package: com.zk.wardrobe.entity
  global-config:
    db-config:
      # 全局主键策略：采用雪花算法生成全局唯一的长整型 ID
      id-type: assign_id
      # 开启表名和字段名的下划线转驼峰 (user_id -> userId)
      table-underline: true
logging:
  level:
    com.zk: info
# 微信小程序配置
wx:
  miniapp:
    appid: wx3715a8d5e75381fe      # 替换为你的 AppID
    secret: 4bf5af3cb60344204eecae2e0fa97a49    # 替换为你的 AppSecret